<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dilema — Generador de Contenido B2B</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0a0a0a;
  --surface: #111111;
  --surface2: #181818;
  --border: #222222;
  --border2: #2a2a2a;
  --text: #f0f0f0;
  --muted: #666666;
  --muted2: #444444;
  --accent: #e8ff3c;
  --accent2: #c8e000;
  --red: #ff4444;
  --blue: #3c8bff;
  --green: #3cff8b;
  --orange: #ff8c3c;
  --purple: #9b3cff;
  --teal: #3cffe0;
  --r: 8px;
  --r2: 12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;min-height:100vh}

/* HEADER */
.header{padding:1.5rem 2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(10,10,10,0.95);backdrop-filter:blur(12px);z-index:100}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;letter-spacing:0.02em;display:flex;align-items:center;gap:10px}
.logo-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;display:inline-block}
.header-tag{font-size:12px;color:var(--muted);border:1px solid var(--border2);border-radius:99px;padding:4px 12px}

/* TABS */
.tabs-wrap{padding:1.5rem 2rem 0;display:flex;gap:4px}
.tab{font-family:'Syne',sans-serif;font-size:13px;font-weight:600;padding:9px 18px;border-radius:var(--r);border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;letter-spacing:0.02em}
.tab:hover{color:var(--text);border-color:var(--border2)}
.tab.on{background:var(--accent);color:#000;border-color:var(--accent)}

/* PANELS */
.panel{display:none;padding:1.5rem 2rem 3rem}
.panel.on{display:block}

/* GENERADOR */
.gen-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.25rem}
@media(max-width:640px){.gen-grid{grid-template-columns:1fr}}
.gen-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:1.25rem}
.gen-card-label{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:0.75rem;display:flex;align-items:center;gap:6px}
.gen-card-label span{width:6px;height:6px;border-radius:50%;display:inline-block}
.lc{background:var(--accent)}
.lf{background:var(--blue)}
.gen-card-val{font-size:15px;color:var(--text);line-height:1.55;min-height:48px}
.gen-card-sub{font-size:12px;color:var(--muted);margin-top:8px}
.cat-badge{display:inline-block;font-size:11px;font-weight:500;padding:3px 10px;border-radius:99px;margin-top:6px}

.btn-gen{display:inline-flex;align-items:center;gap:8px;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;letter-spacing:0.03em;padding:12px 24px;background:var(--accent);color:#000;border:none;border-radius:var(--r);cursor:pointer;transition:all .15s}
.btn-gen:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-gen:active{transform:scale(0.98)}
.btn-gen svg{width:16px;height:16px}

.btn-guion{display:inline-flex;align-items:center;gap:8px;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;letter-spacing:0.03em;padding:12px 24px;background:transparent;color:var(--text);border:1px solid var(--border2);border-radius:var(--r);cursor:pointer;transition:all .15s;margin-left:8px}
.btn-guion:hover{border-color:var(--accent);color:var(--accent)}
.btn-guion:disabled{opacity:0.3;cursor:not-allowed}

.btn-row{display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-top:0.5rem}

/* GUION OUTPUT */
.guion-wrap{margin-top:1.5rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.guion-header{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.guion-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.04em;display:flex;align-items:center;gap:8px}
.guion-title-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.guion-title-dot.done{animation:none;background:var(--green)}
.guion-body{padding:1.5rem;font-size:14px;line-height:1.8;color:var(--text);white-space:pre-wrap;min-height:120px}
.guion-body.loading{color:var(--muted)}
.btn-copy{font-size:12px;font-weight:500;padding:6px 14px;background:transparent;border:1px solid var(--border2);border-radius:var(--r);color:var(--muted);cursor:pointer;transition:all .15s}
.btn-copy:hover{color:var(--text);border-color:var(--border2)}
.btn-copy.copied{color:var(--green);border-color:var(--green)}

/* SEARCH + FILTER */
.search-row{display:flex;gap:8px;margin-bottom:1rem;align-items:center}
.search{flex:1;padding:9px 13px;font-size:14px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif}
.search:focus{outline:none;border-color:var(--border2)}
.search::placeholder{color:var(--muted2)}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.pill{padding:5px 12px;border-radius:99px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .15s;font-family:'DM Sans',sans-serif}
.pill:hover{color:var(--text);border-color:var(--border2)}
.pill.on{font-weight:500}
.p-dolor.on{background:#300;color:#ff8080;border-color:#600}
.p-educacion.on{background:#030;color:#80ff80;border-color:#060}
.p-estrategia.on{background:#001a33;color:#80b4ff;border-color:#003366}
.p-credibilidad.on{background:#1a1000;color:#ffd080;border-color:#332000}
.p-mentalidad.on{background:#1a001a;color:#d080ff;border-color:#330033}
.p-herramientas.on{background:#001a1a;color:#80ffe0;border-color:#003333}
.p-sector.on{background:#1a0d00;color:#ffb880;border-color:#331a00}
.p-edu.on{background:#030;color:#80ff80;border-color:#060}
.p-hook.on{background:#1a1000;color:#ffd080;border-color:#332000}
.p-conv.on{background:#1a001a;color:#d080ff;border-color:#330033}
.p-lista.on{background:#001a33;color:#80b4ff;border-color:#003366}
.p-narrativo.on{background:#300;color:#ff8080;border-color:#600}
.p-visual.on{background:#001a1a;color:#80ffe0;border-color:#003333}
.counter{font-size:12px;color:var(--muted);margin-bottom:0.75rem}

/* CARDS GRID */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px}
.item-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:11px 14px;display:flex;gap:10px;align-items:flex-start;transition:border-color .15s;cursor:default}
.item-card:hover{border-color:var(--border2)}
.item-num{font-size:11px;color:var(--muted2);min-width:24px;font-weight:600;font-family:'Syne',sans-serif;padding-top:2px}
.item-body{flex:1}
.item-txt{font-size:13px;color:var(--text);line-height:1.5}
.item-tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:99px;margin-top:5px;font-weight:500}
.it-dolor{background:#300;color:#ff8080}
.it-educacion{background:#030;color:#80ff80}
.it-estrategia{background:#001a33;color:#80b4ff}
.it-credibilidad{background:#1a1000;color:#ffd080}
.it-mentalidad{background:#1a001a;color:#d080ff}
.it-herramientas{background:#001a1a;color:#80ffe0}
.it-sector{background:#1a0d00;color:#ffb880}
.it-edu{background:#030;color:#80ff80}
.it-hook{background:#1a1000;color:#ffd080}
.it-conv{background:#1a001a;color:#d080ff}
.it-lista{background:#001a33;color:#80b4ff}
.it-narrativo{background:#300;color:#ff8080}
.it-visual{background:#001a1a;color:#80ffe0}

.section-head{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);padding:0.5rem 0 0.5rem;margin-top:0.75rem;border-bottom:1px solid var(--border);margin-bottom:0.75rem}
.section-head:first-child{margin-top:0}
.empty{font-size:14px;color:var(--muted);padding:2rem 0;text-align:center}

/* EMPTY STATE */
.gen-empty{text-align:center;padding:3rem 1rem;color:var(--muted)}
.gen-empty-icon{font-size:2.5rem;margin-bottom:1rem;opacity:0.3}
.gen-empty-text{font-size:14px}

/* CURSOR */
.cursor{display:inline-block;width:2px;height:1em;background:var(--accent);vertical-align:text-bottom;animation:blink .7s steps(1) infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
</style>
</head>
<body>

<div class="header">
  <div class="logo"><span class="logo-dot"></span>Dilema Creative</div>
  <div class="header-tag">Generador de Contenido B2B</div>
</div>

<div class="tabs-wrap">
  <button class="tab on" onclick="switchTab('gen')">Generador</button>

  <button class="tab" onclick="switchTab('formatos')">Formatos <span style="opacity:.5;font-weight:400">(50)</span></button>

<!-- PANEL GENERADOR -->
<div id="p-gen" class="panel on">

      <div class="gen-card-label"><span class="lf"></span>Formato</div>
      <div class="gen-card-val" id="g-f">—</div>
      <div class="gen-card-sub" id="g-fn"></div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn-gen" onclick="generar()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 2l4 4-4 4"/><path d="M3 11V9a4 4 0 014-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>
      Generar idea

  </div>

  <div id="guion-section" style="display:none" class="guion-wrap">
    <div class="guion-header">
      <div class="guion-title">
        <span class="guion-title-dot" id="guion-dot"></span>
        Guion generado
      </div>
      <button class="btn-copy" id="btn-copy" onclick="copiarGuion()">Copiar</button>
    </div>
    <div class="guion-body" id="guion-output"></div>
  </div>
</div>

<!-- PANEL CONCEPTOS -->
<div id="p-conceptos" class="panel">
  <div class="search-row">
    <input class="search" type="text" placeholder="Buscar concepto..." oninput="filterC(this.value)"/>
  </div>
  <div class="filters" id="cf"></div>
  <div class="counter" id="cc">100 conceptos</div>
  <div id="cg"></div>
</div>

<!-- PANEL FORMATOS -->
<div id="p-formatos" class="panel">
  <div class="search-row">
    <input class="search" type="text" placeholder="Buscar formato..." oninput="filterF(this.value)"/>
  </div>
  <div class="filters" id="ff"></div>
  <div class="counter" id="fc">50 formatos</div>
  <div id="fg"></div>
</div>

async function generarGuion(){
  if(!curC||!curF) return;
  const sec=document.getElementById('guion-section');
  const out=document.getElementById('guion-output');
  const dot=document.getElementById('guion-dot');
  const btn=document.getElementById('btn-guion');
  sec.style.display='block';
  dot.classList.remove('done');
  out.textContent='';
  btn.disabled=true;
  out.innerHTML='<span style="color:var(--muted)">Generando guion</span><span class="cursor"></span>';

  const prompt=`Sos el copywriter de Dilema Creative, agencia de marketing digital argentina especializada en empresas B2B e industriales. Escribís con tono directo, cercano, sin corporativo, en argentino (vos/te/querés).

Generá un guion completo para redes sociales (TikTok/Instagram Reels) usando:
- CONCEPTO: "${curC.t}"
- FORMATO: "${curF.t}"

El guion debe tener exactamente esta estructura, usando estos títulos literales:

🎬 HOOK (primeras 3 segundos)
[El gancho que detiene el scroll — una oración impactante, pregunta o dato que genera vacío de conocimiento. Adaptado al formato elegido.]

📹 DESARROLLO
[El cuerpo del video. 4-6 oraciones o pasos claros adaptados al formato. Lenguaje natural, argentino, sin tecnicismos innecesarios. Si el formato es lista, usá numeración. Si es narrativo, contá la historia.]

🎯 CTA
[Call to action. Rotá entre estas opciones según el concepto — elegí la más natural para este video:
- "Seguime si sos dueño o gerente de una empresa industrial y querés crecer en digital."
- "Comentá abajo si te pasó esto — te respondo."
- "Guardá este video. Lo vas a necesitar cuando arranques tu estrategia digital."
- "Mandame un mensaje si querés que auditemos tu presencia digital gratis."

📝 DESCRIPCIÓN / CAPTION
[Caption listo para copiar y pegar. Incluye 2-3 líneas de texto + emojis naturales + 5-8 hashtags relevantes para el nicho B2B/industrial argentino.]

Respondé SOLO con el guion, sin explicaciones adicionales. Usá los emojis de los títulos tal como están.`;

  try{
    const resp=await fetch("/api/claude",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:1000,
        messages:[{role:"user",content:prompt}]
      })
    });
    const data=await resp.json();
    const texto=data.content?.find(b=>b.type==="text")?.text||"Error generando el guion.";

}

async function typeWriter(el,text,dot){
  let i=0;
  el.textContent='';
  const speed=8;
  return new Promise(resolve=>{
    function tick(){
      if(i<text.length){
        el.textContent+=text[i++];
        el.scrollIntoView?el.scrollIntoView({block:'nearest'}):null;
        setTimeout(tick,speed);
      } else {
        dot.classList.add('done');
        resolve();
      }
    }
    tick();
  });
}

function copiarGuion(){
  const txt=document.getElementById('guion-output').textContent;
  navigator.clipboard.writeText(txt).then(()=>{
    const btn=document.getElementById('btn-copy');
    btn.textContent='Copiado';
    btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='Copiar';btn.classList.remove('copied')},2000);
  });
}

// FILTERS / SEARCH
function buildFilters(cats,labels,id,type){
  const d=document.getElementById(id);
  d.innerHTML='<button class="pill on" onclick="setFilter(\'all\',\''+type+'\')">Todos</button>';
  Object.keys(cats).forEach(k=>{
    d.innerHTML+='<button class="pill p-'+k+'" onclick="setFilter(\''+k+'\',\''+type+'\')">'+labels[k]+'</button>';
  });
}

function setFilter(cat,type){
  if(type==='c'){catC=cat;renderC();}
  else{catF=cat;renderF();}
  const id=type==='c'?'cf':'ff';
  document.querySelectorAll('#'+id+' .pill').forEach(p=>p.classList.remove('on'));
  const pills=document.querySelectorAll('#'+id+' .pill');
  if(cat==='all'){pills[0].classList.add('on');}
  else{
    pills.forEach(p=>{
      if(p.getAttribute('onclick')&&p.getAttribute('onclick').includes("'"+cat+"'")){p.classList.add('on');}
    });
  }
}

function filterC(v){sC=v;renderC();}
function filterF(v){sF=v;renderF();}

function renderC(){

  let html='';
  if(catC==='all'){
    Object.keys(LBL_C).forEach(c=>{
      if(!bycat[c])return;
      html+='<div class="section-head">'+LBL_C[c]+'</div><div class="cards-grid">';
      bycat[c].forEach(x=>html+=card(x,'c'));
      html+='</div>';
    });
  } else {
    html='<div class="cards-grid">';
    data.forEach(x=>html+=card(x,'c'));
    html+='</div>';
  }
  document.getElementById('cg').innerHTML=html||'<div class="empty">Sin resultados</div>';
}

function renderF(){
  const data=F.filter(x=>(catF==='all'||x.cat===catF)&&(sF===''||x.t.toLowerCase().includes(sF.toLowerCase())));
  document.getElementById('fc').textContent=data.length+' formato'+(data.length!==1?'s':'');
  const bycat={};data.forEach(x=>{if(!bycat[x.cat])bycat[x.cat]=[];bycat[x.cat].push(x);});
  let html='';
  if(catF==='all'){
    Object.keys(LBL_F).forEach(c=>{
      if(!bycat[c])return;
      html+='<div class="section-head">'+LBL_F[c]+'</div><div class="cards-grid">';
      bycat[c].forEach(x=>html+=card(x,'f'));
      html+='</div>';
    });
  } else {
    html='<div class="cards-grid">';
    data.forEach(x=>html+=card(x,'f'));
    html+='</div>';
  }
  document.getElementById('fg').innerHTML=html||'<div class="empty">Sin resultados</div>';
}

function card(x,type){
  const lbl=type==='c'?(LBL_C[x.cat]||x.cat):(LBL_F[x.cat]||x.cat);
  return`<div class="item-card"><div class="item-num">#${x.n}</div><div class="item-body"><div class="item-txt">${x.t}</div><span class="item-tag it-${x.cat}">${lbl}</span></div></div>`;
}

function switchTab(t){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  const map={gen:0,conceptos:1,formatos:2};

}
